<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iran Conflict Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-brand">Iran Conflict Monitor</div>
    <div class="nav-subtitle">Real-Time Intelligence Dashboard</div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="news">News Feed</button>
      <button class="nav-tab" data-tab="map">Strike Map</button>
      <button class="nav-tab" data-tab="assets">Military Assets</button>
    </div>
    <div class="nav-status">
      <span class="status-dot"></span>
      <span id="last-updated">Loading...</span>
    </div>
  </nav>

  <!-- NEWS TAB -->
  <div id="tab-news" class="tab-content active">
    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-value" id="stat-events">-</div>
        <div class="stat-label">Total Events</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-active-ops">-</div>
        <div class="stat-label">Active Operations</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-countries">-</div>
        <div class="stat-label">Countries Involved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-unconfirmed">-</div>
        <div class="stat-label">Unconfirmed Reports</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-nuclear">-</div>
        <div class="stat-label">Nuclear Events</div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Category</label>
        <select id="filter-category">
          <option value="">All Categories</option>
          <option value="military_operation">Military Operation</option>
          <option value="nuclear_program">Nuclear Program</option>
          <option value="diplomacy">Diplomacy</option>
          <option value="sanctions">Sanctions</option>
          <option value="regional_proxy">Regional Proxy</option>
          <option value="military_deployment">Military Deployment</option>
          <option value="civilian_impact">Civilian Impact</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Source Type</label>
        <select id="filter-source">
          <option value="">All Sources</option>
          <option value="military">Military</option>
          <option value="government">Government</option>
          <option value="news_agency">News Agency</option>
          <option value="think_tank">Think Tank</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filter-confirmed">
          <option value="">All</option>
          <option value="true">Confirmed</option>
          <option value="false">Unconfirmed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="filter-sort">
          <option value="date-desc">Date (Newest First)</option>
          <option value="date-asc">Date (Oldest First)</option>
          <option value="engagement-desc">Engagement (High to Low)</option>
          <option value="engagement-asc">Engagement (Low to High)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="filter-search" placeholder="Search events..." />
      </div>
      <div class="filter-group filter-actions">
        <button id="btn-clear-filters" class="btn-secondary">Clear Filters</button>
        <span id="filter-count" class="filter-count"></span>
      </div>
    </div>

    <!-- NEWS GRID -->
    <div id="news-grid" class="news-grid"></div>
  </div>

  <!-- MAP TAB -->
  <div id="tab-map" class="tab-content">
    <div class="map-layout">
      <!-- Map Controls -->
      <div class="map-controls">
        <div class="map-filter-group">
          <label>Attacker</label>
          <select id="map-filter-attacker">
            <option value="">All Attackers</option>
            <option value="United States">United States</option>
            <option value="Israel">Israel</option>
            <option value="Iran">Iran</option>
            <option value="Houthi/Ansar Allah">Houthi/Ansar Allah</option>
          </select>
        </div>
        <div class="map-filter-group">
          <label>Weapon Type</label>
          <select id="map-filter-weapon">
            <option value="">All Weapons</option>
            <option value="airstrike">Airstrike</option>
            <option value="ballistic missile">Ballistic Missile</option>
            <option value="cruise missile">Cruise Missile</option>
            <option value="drone">Drone</option>
          </select>
        </div>
        <div class="map-filter-group">
          <label>Year</label>
          <select id="map-filter-year">
            <option value="">All Years</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
          </select>
        </div>
        <div class="map-filter-group">
          <label>View</label>
          <select id="map-filter-view">
            <option value="strikes">Strike Events</option>
            <option value="assets">Military Assets</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div class="map-filter-group">
          <label>&nbsp;</label>
          <button id="map-reset" class="btn-secondary">Reset View</button>
        </div>
      </div>
      <!-- Map -->
      <div id="map" class="map-container"></div>
      <!-- Strike List Panel -->
      <div class="strike-list-panel">
        <div class="panel-header">
          <h3>Strike Events</h3>
          <span id="strike-count" class="badge">0</span>
        </div>
        <div id="strike-list" class="strike-list"></div>
      </div>
    </div>
  </div>

  <!-- ASSETS TAB -->
  <div id="tab-assets" class="tab-content">
    <div class="assets-layout">
      <!-- Asset Filters -->
      <div class="asset-filters">
        <div class="filter-group">
          <label>Nation</label>
          <select id="asset-filter-nation">
            <option value="">All Nations</option>
            <option value="United States">United States</option>
            <option value="Israel">Israel</option>
            <option value="Iran">Iran</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
            <option value="UAE">UAE</option>
            <option value="Yemen (Houthi)">Yemen (Houthi)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Asset Type</label>
          <select id="asset-filter-type">
            <option value="">All Types</option>
            <option value="aircraft_carrier">Aircraft Carrier</option>
            <option value="destroyer">Destroyer</option>
            <option value="cruiser">Cruiser</option>
            <option value="submarine">Submarine</option>
            <option value="naval_base">Naval Base</option>
            <option value="air_base">Air Base</option>
            <option value="bomber">Bomber</option>
            <option value="fighter_squadron">Fighter Squadron</option>
            <option value="missile_defense">Missile Defense</option>
            <option value="missile_battery">Missile Battery</option>
            <option value="troops">Troops</option>
            <option value="nuclear_site">Nuclear Site</option>
            <option value="leadership">Leadership</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Status</label>
          <select id="asset-filter-status">
            <option value="">All Status</option>
            <option value="deployed">Deployed</option>
            <option value="active">Active</option>
            <option value="ready">Ready</option>
            <option value="damaged">Damaged</option>
            <option value="destroyed">Destroyed</option>
          </select>
        </div>
      </div>
      <!-- Asset Grid -->
      <div id="asset-grid" class="asset-grid"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  <script src="./news-data.js"></script>
  <script src="./news-data-extra.js"></script>
  <script src="./strikes-data.js"></script>
  <script src="./strikes-data-extra.js"></script>
  <script src="./meta-data.js"></script>
  <script src="./app-core.js"></script>
</body>
</html>
